<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ea580c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#grad)"/>
  <!-- Fork and knife crossed -->
  <g transform="translate(256,256)" stroke="white" stroke-width="28" stroke-linecap="round" fill="none">
    <!-- Fork left -->
    <line x1="-80" y1="-160" x2="-80" y2="160"/>
    <line x1="-80" y1="-160" x2="-110" y2="-80"/>
    <line x1="-80" y1="-160" x2="-50" y2="-80"/>
    <line x1="-80" y1="-60" x2="-80" y2="-20"/>
    <!-- Knife right -->
    <line x1="80" y1="-160" x2="80" y2="160"/>
    <path d="M80,-160 Q130,-100 130,-40 Q130,0 80,20" fill="none"/>
  </g>
</svg>
